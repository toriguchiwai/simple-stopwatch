<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stopwatch</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f0f;
      font-family: 'Courier New', monospace;
      color: #fff;
    }

    .container {
      text-align: center;
    }

    h1 {
      font-size: 1.2rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 2rem;
    }

    .display {
      font-size: clamp(3rem, 12vw, 7rem);
      font-weight: 300;
      letter-spacing: 0.05em;
      color: #f0f0f0;
      margin-bottom: 0.2rem;
      font-variant-numeric: tabular-nums;
    }

    .ms {
      font-size: clamp(1.5rem, 5vw, 3rem);
      color: #888;
      margin-bottom: 3rem;
    }

    .buttons {
      display: flex;
      gap: 1.2rem;
      justify-content: center;
      margin-bottom: 2.5rem;
    }

    button {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: 2px solid;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.15s ease;
      background: transparent;
    }

    #startStop {
      border-color: #4ade80;
      color: #4ade80;
      width: 88px;
      height: 88px;
    }
    #startStop:hover { background: #4ade8022; }
    #startStop.running { border-color: #f87171; color: #f87171; }
    #startStop.running:hover { background: #f8717122; }

    #lap {
      border-color: #60a5fa;
      color: #60a5fa;
    }
    #lap:hover { background: #60a5fa22; }
    #lap:disabled { border-color: #333; color: #333; cursor: default; }
    #lap:disabled:hover { background: transparent; }

    #reset {
      border-color: #888;
      color: #888;
    }
    #reset:hover { background: #88888822; }

    .laps {
      max-height: 260px;
      overflow-y: auto;
      width: 320px;
      margin: 0 auto;
    }

    .laps::-webkit-scrollbar { width: 4px; }
    .laps::-webkit-scrollbar-track { background: #1a1a1a; }
    .laps::-webkit-scrollbar-thumb { background: #444; border-radius: 2px; }

    .lap-row {
      display: flex;
      justify-content: space-between;
      padding: 0.5rem 0.8rem;
      border-bottom: 1px solid #1e1e1e;
      font-size: 0.95rem;
      color: #aaa;
      animation: fadeIn 0.2s ease;
    }
    .lap-row:first-child { color: #fff; }
    .lap-row .lap-num { color: #555; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Stopwatch</h1>
    <div class="display" id="display">00:00</div>
    <div class="ms" id="ms">.00</div>
    <div class="buttons">
      <button id="lap" disabled>Lap</button>
      <button id="startStop">Start</button>
      <button id="reset">Reset</button>
    </div>
    <div class="laps" id="laps"></div>
  </div>

  <script>
    let startTime = 0;
    let elapsed = 0;
    let rafId = null;
    let running = false;
    let lapStart = 0;
    let lapCount = 0;

    const display = document.getElementById('display');
    const msEl = document.getElementById('ms');
    const startStopBtn = document.getElementById('startStop');
    const lapBtn = document.getElementById('lap');
    const resetBtn = document.getElementById('reset');
    const lapsEl = document.getElementById('laps');

    function format(ms) {
      const totalSec = Math.floor(ms / 1000);
      const min = Math.floor(totalSec / 60).toString().padStart(2, '0');
      const sec = (totalSec % 60).toString().padStart(2, '0');
      const cs = Math.floor((ms % 1000) / 10).toString().padStart(2, '0');
      return { main: `${min}:${sec}`, cs: `.${cs}` };
    }

    function tick() {
      elapsed = Date.now() - startTime;
      const f = format(elapsed);
      display.textContent = f.main;
      msEl.textContent = f.cs;
      rafId = requestAnimationFrame(tick);
    }

    startStopBtn.addEventListener('click', () => {
      if (!running) {
        startTime = Date.now() - elapsed;
        if (lapStart === 0) lapStart = startTime;
        running = true;
        rafId = requestAnimationFrame(tick);
        startStopBtn.textContent = 'Stop';
        startStopBtn.classList.add('running');
        lapBtn.disabled = false;
      } else {
        cancelAnimationFrame(rafId);
        running = false;
        startStopBtn.textContent = 'Start';
        startStopBtn.classList.remove('running');
        lapBtn.disabled = true;
      }
    });

    lapBtn.addEventListener('click', () => {
      if (!running) return;
      lapCount++;
      const lapTime = Date.now() - lapStart;
      lapStart = Date.now();
      const f = format(lapTime);
      const row = document.createElement('div');
      row.className = 'lap-row';
      row.innerHTML = `<span class="lap-num">Lap ${lapCount}</span><span>${f.main}${f.cs}</span>`;
      lapsEl.prepend(row);
    });

    resetBtn.addEventListener('click', () => {
      cancelAnimationFrame(rafId);
      running = false;
      elapsed = 0;
      lapStart = 0;
      lapCount = 0;
      display.textContent = '00:00';
      msEl.textContent = '.00';
      startStopBtn.textContent = 'Start';
      startStopBtn.classList.remove('running');
      lapBtn.disabled = true;
      lapsEl.innerHTML = '';
    });
  </script>
</body>
</html>
