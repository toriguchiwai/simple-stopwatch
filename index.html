<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stopwatch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Orbitron:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #080c14;
      --surface: #0e1420;
      --border: rgba(255,255,255,0.06);
      --accent: #00d4ff;
      --accent2: #7c3aed;
      --stop: #ff4d6d;
      --lap-color: #3b82f6;
      --text: #e2e8f0;
      --muted: #475569;
      --glow: 0 0 40px rgba(0,212,255,0.15);
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      font-family: 'Inter', sans-serif;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ambient background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 50% -10%, rgba(0,212,255,0.08) 0%, transparent 70%),
        radial-gradient(ellipse 40% 30% at 80% 100%, rgba(124,58,237,0.08) 0%, transparent 60%);
      pointer-events: none;
    }

    .card {
      position: relative;
      width: min(480px, 94vw);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 2.5rem 2rem 2rem;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.03),
        0 32px 80px rgba(0,0,0,0.5),
        var(--glow);
    }

    /* top label */
    .label {
      text-align: center;
      font-size: 0.7rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 2rem;
    }

    /* ring + display */
    .ring-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 2rem;
    }

    .ring {
      position: relative;
      width: 230px;
      height: 230px;
    }

    .ring svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }

    .ring-bg { fill: none; stroke: rgba(255,255,255,0.04); stroke-width: 3; }
    .ring-progress {
      fill: none;
      stroke: url(#arcGrad);
      stroke-width: 3;
      stroke-linecap: round;
      stroke-dasharray: 628;
      stroke-dashoffset: 628;
      transition: stroke-dashoffset 0.08s linear;
    }

    .ring-inner {
      position: absolute;
      inset: 16px;
      background: var(--bg);
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-shadow: inset 0 2px 12px rgba(0,0,0,0.4);
    }

    .time-main {
      font-family: 'Orbitron', monospace;
      font-size: 2.8rem;
      font-weight: 300;
      letter-spacing: 0.04em;
      color: #fff;
      line-height: 1;
    }

    .time-ms {
      font-family: 'Orbitron', monospace;
      font-size: 1.1rem;
      font-weight: 300;
      color: var(--accent);
      margin-top: 0.3rem;
      letter-spacing: 0.06em;
    }

    /* status dot */
    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--muted);
      margin-top: 0.6rem;
      transition: background 0.3s;
    }
    .status-dot.active {
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* buttons */
    .buttons {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.2rem;
      margin-bottom: 2rem;
    }

    .btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
      cursor: pointer;
      background: none;
      border: none;
      color: inherit;
    }
    .btn-circle {
      width: 56px; height: 56px;
      border-radius: 50%;
      border: 1.5px solid;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s ease;
      font-size: 1rem;
    }
    .btn-label {
      font-size: 0.62rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .btn-start .btn-circle {
      border-color: var(--accent);
      color: var(--accent);
      width: 68px; height: 68px;
      box-shadow: 0 0 20px rgba(0,212,255,0.15);
    }
    .btn-start:hover .btn-circle { background: rgba(0,212,255,0.1); box-shadow: 0 0 28px rgba(0,212,255,0.25); }
    .btn-start.running .btn-circle { border-color: var(--stop); color: var(--stop); box-shadow: 0 0 20px rgba(255,77,109,0.2); }
    .btn-start.running:hover .btn-circle { background: rgba(255,77,109,0.1); }

    .btn-lap .btn-circle { border-color: var(--lap-color); color: var(--lap-color); }
    .btn-lap:hover .btn-circle { background: rgba(59,130,246,0.1); }
    .btn-lap:disabled .btn-circle { border-color: #1e293b; color: #1e293b; cursor: default; box-shadow: none; }
    .btn-lap:disabled:hover .btn-circle { background: none; }
    .btn-lap:disabled .btn-label { color: #1e293b; }

    .btn-reset .btn-circle { border-color: #334155; color: #64748b; }
    .btn-reset:hover .btn-circle { background: rgba(100,116,139,0.1); border-color: #64748b; }

    /* divider */
    .divider {
      height: 1px;
      background: var(--border);
      margin-bottom: 1.2rem;
    }

    /* laps */
    .laps-header {
      display: flex;
      justify-content: space-between;
      padding: 0 0.5rem 0.6rem;
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .laps {
      max-height: 200px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: #1e293b transparent;
    }
    .laps::-webkit-scrollbar { width: 3px; }
    .laps::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 2px; }

    .lap-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.55rem 0.5rem;
      border-radius: 8px;
      font-size: 0.9rem;
      animation: slideIn 0.2s ease;
      transition: background 0.1s;
    }
    .lap-row:hover { background: rgba(255,255,255,0.03); }
    .lap-row:first-child { background: rgba(0,212,255,0.05); }
    .lap-row:first-child .lap-time { color: var(--accent); }

    .lap-num { color: var(--muted); font-size: 0.8rem; min-width: 48px; }
    .lap-time {
      font-family: 'Orbitron', monospace;
      font-size: 0.85rem;
      font-weight: 400;
      letter-spacing: 0.05em;
    }
    .lap-diff { font-size: 0.72rem; color: var(--muted); min-width: 60px; text-align: right; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .empty-laps {
      text-align: center;
      color: #1e293b;
      font-size: 0.8rem;
      padding: 1.5rem 0;
      letter-spacing: 0.08em;
    }
  </style>
</head>
<body>
<div class="card">
  <p class="label">Stopwatch</p>

  <div class="ring-wrap">
    <div class="ring">
      <svg viewBox="0 0 200 200">
        <defs>
          <linearGradient id="arcGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#00d4ff"/>
            <stop offset="100%" stop-color="#7c3aed"/>
          </linearGradient>
        </defs>
        <circle class="ring-bg" cx="100" cy="100" r="95"/>
        <circle class="ring-progress" id="ringProgress" cx="100" cy="100" r="95"/>
      </svg>
      <div class="ring-inner">
        <div class="time-main" id="display">00:00</div>
        <div class="time-ms" id="ms">.00</div>
        <div class="status-dot" id="statusDot"></div>
      </div>
    </div>
  </div>

  <div class="buttons">
    <button class="btn btn-lap" id="lapBtn" disabled>
      <div class="btn-circle">⊕</div>
      <span class="btn-label">Lap</span>
    </button>
    <button class="btn btn-start" id="startStop">
      <div class="btn-circle">▶</div>
      <span class="btn-label">Start</span>
    </button>
    <button class="btn btn-reset" id="resetBtn">
      <div class="btn-circle">↺</div>
      <span class="btn-label">Reset</span>
    </button>
  </div>

  <div class="divider"></div>
  <div class="laps-header"><span>Lap</span><span>Split</span><span>+/-</span></div>
  <div class="laps" id="laps">
    <div class="empty-laps" id="emptyMsg">No laps recorded</div>
  </div>
</div>

<script>
  let startTime = 0, elapsed = 0, rafId = null, running = false;
  let lapStart = 0, lapCount = 0, lapTimes = [];
  const CIRC = 2 * Math.PI * 95;

  const displayEl = document.getElementById('display');
  const msEl      = document.getElementById('ms');
  const ring      = document.getElementById('ringProgress');
  const dot       = document.getElementById('statusDot');
  const startBtn  = document.getElementById('startStop');
  const lapBtn    = document.getElementById('lapBtn');
  const resetBtn  = document.getElementById('resetBtn');
  const lapsEl    = document.getElementById('laps');
  const emptyMsg  = document.getElementById('emptyMsg');

  ring.style.strokeDasharray = CIRC;

  function fmt(ms) {
    const totalSec = Math.floor(ms / 1000);
    const min = Math.floor(totalSec / 60).toString().padStart(2,'0');
    const sec = (totalSec % 60).toString().padStart(2,'0');
    const cs  = Math.floor((ms % 1000) / 10).toString().padStart(2,'0');
    return { main: `${min}:${sec}`, cs: `.${cs}` };
  }

  function fmtSign(ms) {
    const sign = ms >= 0 ? '+' : '-';
    const abs = Math.abs(ms);
    const s = (Math.floor(abs/1000)%60).toString().padStart(2,'0');
    const cs = Math.floor((abs%1000)/10).toString().padStart(2,'0');
    return `${sign}${s}.${cs}`;
  }

  function updateRing(ms) {
    const secs = (ms / 1000) % 60;
    const offset = CIRC - (secs / 60) * CIRC;
    ring.style.strokeDashoffset = offset;
  }

  function tick() {
    elapsed = Date.now() - startTime;
    const f = fmt(elapsed);
    displayEl.textContent = f.main;
    msEl.textContent = f.cs;
    updateRing(elapsed);
    rafId = requestAnimationFrame(tick);
  }

  startBtn.addEventListener('click', () => {
    if (!running) {
      startTime = Date.now() - elapsed;
      if (!lapStart) lapStart = startTime;
      running = true;
      rafId = requestAnimationFrame(tick);
      startBtn.querySelector('.btn-circle').textContent = '■';
      startBtn.querySelector('.btn-label').textContent = 'Stop';
      startBtn.classList.add('running');
      dot.classList.add('active');
      lapBtn.disabled = false;
    } else {
      cancelAnimationFrame(rafId);
      running = false;
      startBtn.querySelector('.btn-circle').textContent = '▶';
      startBtn.querySelector('.btn-label').textContent = 'Start';
      startBtn.classList.remove('running');
      dot.classList.remove('active');
      lapBtn.disabled = true;
    }
  });

  lapBtn.addEventListener('click', () => {
    if (!running) return;
    lapCount++;
    const now = Date.now();
    const split = now - lapStart;
    lapStart = now;
    lapTimes.push(split);
    const avg = lapTimes.reduce((a,b)=>a+b,0) / lapTimes.length;
    const diff = split - avg;
    const f = fmt(split);
    if (emptyMsg) emptyMsg.remove();
    const row = document.createElement('div');
    row.className = 'lap-row';
    row.innerHTML = `
      <span class="lap-num">Lap ${lapCount}</span>
      <span class="lap-time">${f.main}${f.cs}</span>
      <span class="lap-diff">${lapCount === 1 ? '—' : fmtSign(diff)}</span>`;
    lapsEl.prepend(row);
  });

  resetBtn.addEventListener('click', () => {
    cancelAnimationFrame(rafId);
    running = false; elapsed = 0; lapStart = 0; lapCount = 0; lapTimes = [];
    displayEl.textContent = '00:00';
    msEl.textContent = '.00';
    ring.style.strokeDashoffset = CIRC;
    startBtn.querySelector('.btn-circle').textContent = '▶';
    startBtn.querySelector('.btn-label').textContent = 'Start';
    startBtn.classList.remove('running');
    dot.classList.remove('active');
    lapBtn.disabled = true;
    lapsEl.innerHTML = '<div class="empty-laps" id="emptyMsg">No laps recorded</div>';
  });
</script>
</body>
</html>
